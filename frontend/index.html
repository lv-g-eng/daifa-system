<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>代发系统 - 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      /* 隐藏滚动条但保持滚动功能 */
      scrollbar-width: none;
      /* Firefox */
      -ms-overflow-style: none;
      /* IE and Edge */
    }

    body::-webkit-scrollbar {
      display: none;
      /* Chrome, Safari, Opera */
    }

    html {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar {
      display: none;
    }

    .login-container {
      display: flex;
      min-height: 100vh;
    }

    /* 左侧品牌区域 */
    .brand-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem;
      position: relative;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      overflow: hidden;
    }

    /* 动态背景 */
    .brand-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }

    /* 粒子动画 */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(102, 126, 234, 0.5);
      border-radius: 50%;
      animation: float-particle 15s infinite ease-in-out;
    }

    @keyframes float-particle {

      0%,
      100% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100vh) translateX(50px);
        opacity: 0;
      }
    }

    .brand-content {
      position: relative;
      z-index: 1;
      max-width: 520px;
      text-align: center;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .brand-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
      animation: logo-float 3s ease-in-out infinite, logo-glow 2s ease-in-out infinite alternate;
      position: relative;
    }

    .brand-logo-icon::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 50%, #ff2442 100%);
      background-size: 200% 200%;
      animation: border-rotate 3s linear infinite;
      z-index: -1;
      opacity: 0.6;
    }

    @keyframes logo-float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(5deg);
      }
    }

    @keyframes logo-glow {
      0% {
        box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
      }

      100% {
        box-shadow: 0 12px 48px rgba(168, 85, 247, 0.6);
      }
    }

    @keyframes border-rotate {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    .brand-logo-text {
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: text-shimmer 3s ease-in-out infinite;
    }

    @keyframes text-shimmer {

      0%,
      100% {
        filter: brightness(1);
      }

      50% {
        filter: brightness(1.3);
      }
    }

    .brand-tagline {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .brand-tagline span {
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-description {
      font-size: 1.125rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.8;
      margin-bottom: 3rem;
    }

    /* 特性卡片轮播 */
    .features-carousel {
      position: relative;
      height: 100px;
      perspective: 1000px;
      margin-top: 1rem;
    }

    .feature-item {
      position: absolute;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: rotateX(-90deg) translateY(50px);
      transform-origin: top center;
      backface-visibility: hidden;
    }

    .feature-item.active {
      opacity: 1;
      transform: rotateX(0deg) translateY(0);
    }

    .feature-item.exit {
      opacity: 0;
      transform: rotateX(90deg) translateY(-50px);
    }

    .feature-item:hover {
      background: rgba(102, 126, 234, 0.15);
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(168, 85, 247, 0.25) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff6b81;
      font-size: 1.5rem;
      flex-shrink: 0;
      animation: icon-pulse 2s ease-in-out infinite;
    }

    @keyframes icon-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .feature-text {
      text-align: left;
    }

    .feature-text h4 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.35rem;
    }

    .feature-text p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* 轮播指示器 */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .carousel-dot.active {
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      width: 24px;
      border-radius: 4px;
    }

    /* 右侧登录区域 */
    .login-section {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      background: #111;
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      perspective: 1500px;
    }

    /* 3D 翻转卡片容器 */
    .flip-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 520px;
      margin: 0 auto;
    }

    .flip-card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .flip-card.flipped {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      padding: 2rem;
      background: rgba(30, 30, 30, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      /* 隐藏滚动条但保持滚动功能 */
      scrollbar-width: none;
      /* Firefox */
      -ms-overflow-style: none;
      /* IE and Edge */
    }

    .flip-card-front::-webkit-scrollbar,
    .flip-card-back::-webkit-scrollbar {
      display: none;
      /* Chrome, Safari, Opera */
    }

    .flip-card-front {
      z-index: 2;
    }

    .flip-card-back {
      transform: rotateY(180deg);
      visibility: hidden;
    }

    .flip-card.flipped .flip-card-front {
      visibility: hidden;
    }

    .flip-card.flipped .flip-card-back {
      visibility: visible;
    }

    /* 翻转卡片边缘光效 */
    .flip-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 50%, #ff2442 100%);
      background-size: 200% 200%;
      animation: card-glow 3s ease-in-out infinite;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.3s ease;
    }

    .flip-card:hover::before {
      opacity: 0.5;
    }

    @keyframes card-glow {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .login-card {
      width: 100%;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9375rem;
    }

    /* 标签切换 */
    .tab-container {
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
    }

    .tab-item {
      flex: 1;
      padding: 0.875rem 1rem;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9375rem;
    }

    .tab-item.active {
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .tab-item:hover:not(.active) {
      color: rgba(255, 255, 255, 0.8);
    }

    /* 表单样式 */
    .form-field {
      margin-bottom: 1.25rem;
    }

    .form-field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 1rem;
    }

    .form-field input {
      width: 100%;
      padding: 0.9375rem 1rem 0.9375rem 2.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 16px;
      /* 防止iOS缩放 */
      color: #fff;
      transition: all 0.3s ease;
      touch-action: manipulation;
      -webkit-user-select: text;
      user-select: text;
    }

    .form-field input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-field input:focus {
      outline: none;
      border-color: #ff2442;
      background: rgba(102, 126, 234, 0.1);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .form-field {
      position: relative;
      z-index: 10;
    }

    .input-wrapper {
      position: relative;
      z-index: 11;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* 分隔线 */
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8125rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      padding: 0 1rem;
    }

    /* 测试账号 */
    .test-accounts {
      text-align: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .test-accounts p {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.4);
      margin: 0.25rem 0;
    }

    .test-accounts .accounts {
      color: #ff2442;
      font-weight: 500;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
    }

    /* Toast 样式 */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      padding: 1rem 1.5rem;
      border-radius: 10px;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9375rem;
    }

    .toast-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }

    .toast-error {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .login-container {
        flex-direction: column;
      }

      .brand-section {
        padding: 2rem;
        min-height: auto;
      }

      .brand-tagline {
        font-size: 1.75rem;
      }

      .features {
        display: none;
      }

      .login-section {
        width: 100%;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
    }

    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        min-height: 100vh;
      }

      .brand-section {
        padding: 1.5rem 1rem;
        min-height: 30vh;
        flex: none;
      }

      .brand-content {
        transform: scale(0.9);
      }

      .brand-logo {
        margin-bottom: 1rem;
      }

      .brand-logo-icon {
        width: 40px;
        height: 40px;
        font-size: 1.125rem;
      }

      .brand-logo-text {
        font-size: 1.25rem;
      }

      .brand-tagline {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .brand-description {
        font-size: 0.8125rem;
        margin-bottom: 1rem;
        display: none;
      }

      .features-carousel {
        display: none;
      }

      .carousel-dots {
        display: none;
      }

      .login-section {
        flex: 1;
        padding: 1.5rem;
        border-top: none;
        display: flex;
        align-items: flex-start;
        padding-top: 0;
      }

      .flip-container {
        width: 100%;
        max-width: 100%;
        height: auto;
        min-height: 450px;
      }

      .flip-card {
        position: relative;
      }

      .flip-card-front,
      .flip-card-back {
        position: relative;
        padding: 1.5rem;
        border-radius: 16px;
        height: auto;
        min-height: 400px;
      }

      .flip-card-back {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }

      .login-header {
        margin-bottom: 1.5rem;
      }

      .login-header h2 {
        font-size: 1.5rem;
      }

      .login-header p {
        font-size: 0.875rem;
      }

      .tab-container {
        margin-bottom: 1.5rem;
      }

      .tab-item {
        padding: 0.75rem 0.875rem;
        font-size: 0.875rem;
      }

      .form-field {
        margin-bottom: 1rem;
      }

      .form-field label {
        font-size: 0.8125rem;
      }

      /* 移动端全屏暗色登录设计 */
      .login-container {
        display: block;
        min-height: 100vh;
        background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      }

      /* 隐藏桌面端品牌区域 */
      .brand-section {
        display: none;
      }

      .login-section {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        border: none;
        background: transparent;
      }

      /* 移动端Logo区域 */
      .login-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
        pointer-events: none;
      }

      .flip-container {
        position: relative;
        width: 100%;
        max-width: 360px;
        height: auto;
        margin: 0 auto;
      }

      .flip-card {
        position: relative;
        width: 100%;
        height: auto;
      }

      .flip-card-front,
      .flip-card-back {
        position: relative;
        width: 100%;
        height: auto;
        padding: 2rem 1.5rem;
        background: rgba(30, 30, 45, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        backdrop-filter: blur(20px);
      }

      .flip-card-back {
        position: absolute;
        top: 0;
        left: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .flip-card.flipped .flip-card-front {
        visibility: hidden;
        pointer-events: none;
      }

      .flip-card.flipped .flip-card-back {
        visibility: visible;
        pointer-events: auto;
      }

      /* 添加移动端顶部Logo */
      .login-header::before {
        content: '🚀';
        display: block;
        font-size: 2.5rem;
        text-align: center;
        margin-bottom: 1rem;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {

        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
      }

      .login-header p {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.5);
      }

      .form-field {
        margin-bottom: 1.25rem;
        position: relative;
        z-index: 10;
      }

      .form-field label {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.8125rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
      }

      .form-field input {
        width: 100%;
        padding: 1rem 1rem 1rem 2.75rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #fff;
        font-size: 16px;
        /* 防止iOS缩放 */
        transition: all 0.3s ease;
        touch-action: manipulation;
        -webkit-user-select: text;
        user-select: text;
        -webkit-appearance: none;
        appearance: none;
      }

      .form-field input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .form-field input:focus {
        outline: none;
        border-color: rgba(102, 126, 234, 0.6);
        background: rgba(102, 126, 234, 0.08);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
      }

      .input-wrapper {
        position: relative;
        z-index: 11;
      }

      .input-wrapper i {
        color: rgba(255, 255, 255, 0.4);
        font-size: 1rem;
        left: 1rem;
      }

      .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
      }

      .submit-btn:hover,
      .submit-btn:active {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(102, 126, 234, 0.45);
      }

      .divider {
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.8125rem;
        margin: 1.5rem 0;
      }

      .divider::before,
      .divider::after {
        background: rgba(255, 255, 255, 0.1);
      }

      .footer {
        margin-top: 1.5rem;
        text-align: center;
      }

      .footer p {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.3);
      }
    }

    @media (max-width: 480px) {
      .login-section {
        padding: 1rem;
      }

      .flip-card-front,
      .flip-card-back {
        padding: 1.5rem 1.25rem;
      }

      .login-header::before {
        font-size: 2rem;
      }

      .login-header h2 {
        font-size: 1.375rem;
      }
    }

    /* 超小屏幕适配 */
    @media (max-width: 375px) {

      .flip-card-front,
      .flip-card-back {
        padding: 1.25rem 1rem;
      }

      .login-header {
        margin-bottom: 1.5rem;
      }

      .login-header::before {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }

      .login-header h2 {
        font-size: 1.25rem;
      }

      .form-field {
        margin-bottom: 1rem;
      }

      .submit-btn {
        padding: 0.875rem;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <!-- 左侧品牌区域 -->
    <div class="brand-section">
      <div class="particles" id="particles"></div>

      <div class="brand-content">
        <div class="brand-logo">
          <div class="brand-logo-icon">
            <i class="fas fa-rocket"></i>
          </div>
          <span class="brand-logo-text">代发系统</span>
        </div>

        <h1 class="brand-tagline">
          内容代发<span>一站式</span><br>管理平台
        </h1>

        <p class="brand-description">
          专业的小红书内容代发管理系统，帮助您高效管理素材发布、任务分配与收益结算。
        </p>

        <div class="features-carousel" id="featuresCarousel">
          <div class="feature-item active" data-index="0">
            <div class="feature-icon">
              <i class="fas fa-bolt"></i>
            </div>
            <div class="feature-text">
              <h4>高效分发</h4>
              <p>批量管理素材，一键生成发布码</p>
            </div>
          </div>
          <div class="feature-item" data-index="1">
            <div class="feature-icon">
              <i class="fas fa-chart-line"></i>
            </div>
            <div class="feature-text">
              <h4>数据追踪</h4>
              <p>实时监控发布进度与审核状态</p>
            </div>
          </div>
          <div class="feature-item" data-index="2">
            <div class="feature-icon">
              <i class="fas fa-wallet"></i>
            </div>
            <div class="feature-text">
              <h4>便捷结算</h4>
              <p>自动计算收益，支持多种提现方式</p>
            </div>
          </div>
          <div class="feature-item" data-index="3">
            <div class="feature-icon">
              <i class="fas fa-shield-alt"></i>
            </div>
            <div class="feature-text">
              <h4>安全可靠</h4>
              <p>数据加密存储，保障账户安全</p>
            </div>
          </div>
        </div>
        <div class="carousel-dots">
          <div class="carousel-dot active" data-index="0"></div>
          <div class="carousel-dot" data-index="1"></div>
          <div class="carousel-dot" data-index="2"></div>
          <div class="carousel-dot" data-index="3"></div>
        </div>
      </div>
    </div>

    <!-- 右侧登录区域 -->
    <div class="login-section">
      <div class="flip-container">
        <div class="flip-card" id="flipCard">
          <!-- 正面：登录表单 -->
          <div class="flip-card-front">
            <div class="login-card">
              <div class="login-header">
                <h2>欢迎回来</h2>
                <p>登录以继续使用代发系统</p>
              </div>

              <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-field">
                  <label>用户名</label>
                  <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                  </div>
                </div>
                <div class="form-field">
                  <label>密码</label>
                  <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                  </div>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">
                  <i class="fas fa-sign-in-alt"></i>
                  登录
                </button>
              </form>

              <div class="divider"><span>没有账号？</span></div>
              <button class="submit-btn"
                style="background: transparent; border: 1px solid rgba(102, 126, 234, 0.5); box-shadow: none;"
                onclick="flipToRegister()">
                <i class="fas fa-user-plus"></i>
                立即注册
              </button>

              <div class="footer">
                <p>© 2024 代发系统 · 版权所有</p>
              </div>
            </div>
          </div>

          <!-- 背面：注册表单 -->
          <div class="flip-card-back">
            <div class="login-card">
              <div class="login-header">
                <h2>创建账号</h2>
                <p>注册成为代发系统用户</p>
              </div>

              <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-field">
                  <label>用户名</label>
                  <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="请输入用户名" required>
                  </div>
                </div>
                <div class="form-field">
                  <label>密码</label>
                  <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="请输入密码" required>
                  </div>
                </div>
                <div class="form-field">
                  <label>昵称</label>
                  <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="regNickname" placeholder="请输入昵称">
                  </div>
                </div>
                <div class="form-field">
                  <label>邀请码（选填）</label>
                  <div class="input-wrapper">
                    <i class="fas fa-gift"></i>
                    <input type="text" id="regInviteCode" placeholder="填写邀请人用户名可获得奖励">
                  </div>
                </div>
                <button type="submit" class="submit-btn" id="registerBtn">
                  <i class="fas fa-user-plus"></i>
                  注册
                </button>
              </form>

              <div class="divider"><span>已有账号？</span></div>
              <button class="submit-btn"
                style="background: transparent; border: 1px solid rgba(102, 126, 234, 0.5); box-shadow: none;"
                onclick="flipToLogin()">
                <i class="fas fa-sign-in-alt"></i>
                返回登录
              </button>

              <div class="footer">
                <p>© 2024 代发系统 · 版权所有</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script>
    // 生成粒子
    (function () {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (10 + Math.random() * 20) + 's';
        container.appendChild(particle);
      }
    })();

    // 特性卡片轮播
    (function () {
      const items = document.querySelectorAll('.feature-item');
      const dots = document.querySelectorAll('.carousel-dot');
      let currentIndex = 0;
      const total = items.length;

      function showItem(index) {
        items.forEach((item, i) => {
          item.classList.remove('active', 'exit');
          if (i === currentIndex) {
            item.classList.add('exit');
          }
        });
        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });

        setTimeout(() => {
          items.forEach((item, i) => {
            item.classList.remove('active', 'exit');
            if (i === index) {
              item.classList.add('active');
            }
          });
        }, 300);
        currentIndex = index;
      }

      // 点击指示器切换
      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => showItem(i));
      });

      // 自动轮播
      setInterval(() => {
        const next = (currentIndex + 1) % total;
        showItem(next);
      }, 3000);
    })();

    // 3D翻转卡片函数
    function flipToRegister() {
      document.getElementById('flipCard').classList.add('flipped');
    }

    function flipToLogin() {
      document.getElementById('flipCard').classList.remove('flipped');
    }

    // 旧的switchTab函数保持向后兼容
    function switchTab(tab) {
      if (tab === 'register') {
        flipToRegister();
      } else {
        flipToLogin();
      }
    }

    const API_BASE = '/api';

    function setToken(token) { localStorage.setItem('token', token); }
    function getToken() { return localStorage.getItem('token'); }
    function setUser(user) { localStorage.setItem('user', JSON.stringify(user)); }
    function getUser() { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }
    function isLoggedIn() { return !!getToken(); }

    function navigateByRole() {
      const user = getUser();
      if (!user) return;
      switch (user.role) {
        case 'admin': window.location.href = '/admin'; break;
        case 'merchant': window.location.href = '/merchant'; break;
        default: window.location.href = '/user';
      }
    }

    function showToast(message, type = 'success') {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
      toast.innerHTML = '<i class="fas fa-' + icon + '"></i><span>' + message + '</span>';
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    if (isLoggedIn()) {
      navigateByRole();
    } else {
      // Check for invite code in URL and auto-fill
      const urlParams = new URLSearchParams(window.location.search);
      const refCode = urlParams.get('ref');
      if (refCode) {
        // Switch to register tab and fill invite code
        switchTab('register');
        document.getElementById('regInviteCode').value = refCode;
      }
    }

    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab-item');
      tabs.forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';

      // 更新标题
      document.querySelector('.login-header h2').textContent = tab === 'login' ? '欢迎回来' : '创建账号';
      document.querySelector('.login-header p').textContent = tab === 'login' ? '登录以继续使用代发系统' : '注册成为新用户';
    }

    async function handleLogin(e) {
      e.preventDefault();

      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

      try {
        const response = await fetch(API_BASE + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const res = await response.json();

        if (res.code === 200) {
          setToken(res.data.token);
          setUser(res.data.user);
          showToast('登录成功');
          setTimeout(() => navigateByRole(), 500);
        } else {
          showToast(res.message || '登录失败', 'error');
        }
      } catch (error) {
        showToast('网络错误: ' + error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();

      const data = {
        username: document.getElementById('regUsername').value,
        password: document.getElementById('regPassword').value,
        nickname: document.getElementById('regNickname').value,
        invite_code: document.getElementById('regInviteCode').value,
      };

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

      try {
        const response = await fetch(API_BASE + '/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const res = await response.json();
        if (res.code === 200) {
          setToken(res.data.token);
          setUser(res.data.user);
          showToast('注册成功');
          setTimeout(() => navigateByRole(), 500);
        } else {
          showToast(res.message || '注册失败', 'error');
        }
      } catch (error) {
        showToast('网络错误: ' + error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
      }
    }
  </script>
</body>

</html>
